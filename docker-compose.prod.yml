# docker-compose.prod.yml — Configuration PRODUCTION (app.bazaart.fr)
#
# ⚠️  Ce fichier NE lance PAS de Nginx.
#     Le Nginx de bazaart2 (bazaart_nginx) est le seul reverse proxy du serveur.
#     Il gère bazaart.fr ET app.bazaart.fr depuis le réseau bazaart2_bazaart_network.
#
# Architecture :
#   Internet → bazaart_nginx → bazaart_platform_app (ce container, port 9000)
#                            → bazaart_platform_postgres
#                            → bazaart_platform_redis
#
# Utilisation :
#   docker compose -f docker-compose.prod.yml up -d

services:

  # ── PHP-FPM : application Symfony ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    # Nom unique pour ne pas entrer en conflit avec bazaart_app (bazaart2)
    container_name: bazaart_platform_app
    restart: unless-stopped
    volumes:
      - ./app:/var/www/html
      # Volume séparé pour les uploads (avatars, logos, images articles)
      - uploads_data:/var/www/html/public/uploads
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@bazaart_platform_postgres:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      REDIS_URL: redis://bazaart_platform_redis:6379
      MAILER_DSN: ${MAILER_DSN:-null://null}
    depends_on:
      - postgres
      - redis
    networks:
      # Réseau interne pour communiquer avec postgres et redis
      - platform_internal
      # Réseau du Nginx existant (bazaart_nginx) — nécessaire pour qu'il atteigne ce container
      - bazaart2_bazaart_network

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    # Nom unique pour ne pas écraser bazaart_postgres (bazaart2)
    container_name: bazaart_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Volume séparé = données indépendantes de bazaart2
      - platform_postgres_data:/var/lib/postgresql/data
    networks:
      - platform_internal

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    # Nom unique pour ne pas écraser bazaart_redis (bazaart2)
    container_name: bazaart_platform_redis
    restart: unless-stopped
    networks:
      - platform_internal

volumes:
  platform_postgres_data:   # Données PostgreSQL isolées de bazaart2
  uploads_data:             # Fichiers uploadés (avatars, logos, etc.)

networks:
  # Réseau interne entre app, postgres et redis
  platform_internal:
    driver: bridge

  # Réseau EXISTANT du Nginx de bazaart2 — on s'y branche sans le recréer
  bazaart2_bazaart_network:
    external: true
