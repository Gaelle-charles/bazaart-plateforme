# nginx/app.bazaart.fr.conf — Configuration pour le sous-domaine app.bazaart.fr
#
# Ce fichier est chargé par le bazaart_nginx de bazaart2.
# Il ajoute app.bazaart.fr sans toucher à la config de bazaart.fr.
#
# Pour activer : monter ce fichier dans bazaart_nginx via docker-compose de bazaart2
# (voir instructions dans /root/bazaart2/docker-compose.prod.yml)

# ── 0. Masquage du token de réinitialisation dans les logs (sécurité) ────────
# L'URL /reinitialiser-mot-de-passe/<token> contient un secret valable 1 heure.
# Par défaut, Nginx logue l'URL complète dans access_log → le token s'y retrouverait
# en clair. On remplace le token par un libellé neutre dans les logs de ce vhost.
# Le map et le log_format sont déclarés ici (contexte http via conf.d) mais ne
# s'appliquent qu'au server qui référence access_log bazaart_masked (app.bazaart.fr).
# La config de bazaart.fr (vitrine) n'est pas affectée.
map $request_uri $bazaart_logged_uri {
    ~^/reinitialiser-mot-de-passe/  "/reinitialiser-mot-de-passe/[token-masque]";
    default                          $request_uri;
}

log_format bazaart_masked '$remote_addr - $remote_user [$time_local] '
                          '"$request_method $bazaart_logged_uri $server_protocol" '
                          '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

# ── 1. HTTP → HTTPS ────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.bazaart.fr;

    # Webroot Let's Encrypt (même dossier que bazaart.fr, déjà monté dans Nginx)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirection vers HTTPS
    location / {
        return 301 https://app.bazaart.fr$request_uri;
    }
}

# ── 2. HTTPS — Application Symfony (app.bazaart.fr) ───────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.bazaart.fr;

    # Certificat SSL propre à app.bazaart.fr (généré par Certbot)
    ssl_certificate     /etc/letsencrypt/live/app.bazaart.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.bazaart.fr/privkey.pem;

    # Dossier public du NOUVEAU projet Symfony (monté séparément dans Nginx)
    root /var/www/platform/public;
    index index.php;

    # Journal d'accès avec masquage du token de reset (cf. bloc 0 ci-dessus)
    access_log /var/log/nginx/access.log bazaart_masked;

    # Taille max des uploads
    client_max_body_size 10M;

    # ── Fichiers statiques : servis directement par Nginx ──
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Toutes les requêtes → Symfony (index.php) ──
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # ── PHP-FPM → container bazaart_platform_app ──
    location ~ ^/index\.php(/|$) {
        # On pointe vers le NOUVEAU container PHP, pas vers bazaart_app !
        fastcgi_pass bazaart_platform_app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        # Le chemin doit correspondre au filesystem du container PHP (bazaart_platform_app),
        # pas au filesystem de Nginx — les deux containers ont des chemins différents.
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        internal;
    }

    # Bloque l'accès direct aux autres fichiers .php
    location ~ \.php$ {
        return 404;
    }
}
