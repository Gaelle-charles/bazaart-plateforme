# nginx/prod.conf — Configuration Nginx PRODUCTION
# Gère : HTTP→HTTPS redirect, SSL, PHP-FPM Symfony, fichiers statiques

# ── 1. HTTP → HTTPS (bazaart.fr et www.bazaart.fr) ───────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bazaart.fr www.bazaart.fr;

    # Route réservée pour le renouvellement automatique des certs Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS sur le domaine sans www (canonique)
    location / {
        return 301 https://bazaart.fr$request_uri;
    }
}

# ── 2. www → sans www (redirection permanente) ───────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.bazaart.fr;

    # Le certificat doit couvrir les deux domaines (voir note ci-dessous)
    ssl_certificate     /etc/letsencrypt/live/bazaart.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bazaart.fr/privkey.pem;

    # Redirection permanente www → sans www
    return 301 https://bazaart.fr$request_uri;
}

# ── 3. HTTPS — Application Symfony ───────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name bazaart.fr;

    # Certificats SSL générés par Certbot
    ssl_certificate     /etc/letsencrypt/live/bazaart.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bazaart.fr/privkey.pem;

    # Dossier public de Symfony (contient index.php + assets CSS/JS/images)
    root /var/www/html/public;
    index index.php;

    # Taille max des uploads (avatars, logos, images d'articles)
    client_max_body_size 10M;

    # ── Fichiers statiques : servis directement par Nginx (rapide) ──
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Toutes les autres requêtes → Symfony (index.php) ──
    location / {
        try_files $uri /index.php$is_args$args;
    }

    # ── PHP-FPM : traite les fichiers .php ──
    location ~ ^/index\.php(/|$) {
        # "app" = nom du service PHP dans docker-compose, port 9000 (FPM)
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Transmet l'IP réelle du visiteur à Symfony
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        internal;
    }

    # Bloque l'accès direct aux autres fichiers .php (sécurité)
    location ~ \.php$ {
        return 404;
    }
}
